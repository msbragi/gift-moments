<div *transloco="let t; read: 'forgotPassword'" class="forgot-password-container">
    <div class="forgot-password-card">
      <h1 class="forgot-password-title">{{ isLoggedIn ? t('changePassword') : t('resetPassword') }}</h1>
      <p class="forgot-password-subtitle">
        {{ isLoggedIn ? t('changePasswordInfo') : t('enterEmail') }}
      </p>
      
      <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ t('emailLabel') }}</mat-label>
          <input matInput formControlName="email" type="email" [placeholder]="t('emailPlaceholder')">
          <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('required')">
            {{ t('emailRequired') }}
          </mat-error>
          <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('email')">
            {{ t('emailInvalid') }}
          </mat-error>
        </mat-form-field>
        
        <div class="actions">
          <button mat-stroked-button type="button" [routerLink]="isLoggedIn ? ['/dashboard'] : ['/login']">
            {{ t('cancel') }}
          </button>
          <button mat-raised-button color="primary" type="submit" 
                  [disabled]="forgotPasswordForm.invalid || loading">
            {{ loading ? t('sending') : (isLoggedIn ? t('sendChangeLink') : t('sendResetLink')) }}
          </button>
        </div>
      </form>
    </div>
  </div>
