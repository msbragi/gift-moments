title = "Gift Moments Gitleaks Config"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore paths matching .gitignore patterns"
paths = [
    '''Docker/''',
    '''docs/''',
    '''node_modules''',
    '''\.angular''',
    '''dist/''',
    '''build/''',
    '''coverage/''',
    '''\.sass-cache''',
    '''\.env''',
    '''\.vscode''',
    '''\.idea''',
    '''\.swp$''',
    '''\.swo$''',
    '''logs/''',
    '''\.log$''',
    '''npm-debug\.log''',
    '''yarn-debug\.log''',
    '''yarn-error\.log''',
    '''data/''',
    '''\.sqlite$''',
    '''\.db$''',
    '''\.tmp$''',
    '''\.temp$''',
    '''\.gz$''',
    '''\.zip$''',
    '''\.tar$''',
    '''\.bak$''',
    '''\.DS_Store''',
    '''Thumbs\.db''',
    '''Cleanup\.md''',
    '''\.github/''',
]
